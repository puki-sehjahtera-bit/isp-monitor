<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISP Monitor — Global Network Health</title>
<style>
  :root { --bg:#0d1117; --card:#161b22; --line:#30363d; --ok:#3fb950; --fail:#f85149; --txt:#e6edf3; --mut:#8b949e; --acc:#58a6ff; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--txt); }
  header { padding:16px 24px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; }
  header h1 { margin:0; font-size:20px; }
  header .sub { color:var(--mut); font-size:13px; }
  .wrap { padding:20px 24px; max-width:1100px; margin:0 auto; }
  .stats { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:20px; }
  .stat { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:14px 18px; flex:1; min-width:150px; }
  .stat .v { font-size:24px; font-weight:700; }
  .stat .l { color:var(--mut); font-size:12px; margin-top:4px; }
  table { width:100%; border-collapse:collapse; background:var(--card); border:1px solid var(--line); border-radius:10px; overflow:hidden; }
  th,td { padding:11px 14px; text-align:left; border-bottom:1px solid var(--line); font-size:14px; }
  th { color:var(--mut); font-weight:600; font-size:12px; text-transform:uppercase; letter-spacing:.5px; }
  tr:last-child td { border-bottom:none; }
  .badge { padding:2px 9px; border-radius:20px; font-size:12px; font-weight:600; }
  .badge.ok { background:rgba(63,185,80,.15); color:var(--ok); }
  .badge.fail { background:rgba(248,81,73,.15); color:var(--fail); }
  .bar { height:6px; border-radius:4px; background:var(--line); overflow:hidden; min-width:80px; }
  .bar > span { display:block; height:100%; background:var(--ok); }
  .actions { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
  input,button,select { font-family:inherit; font-size:14px; }
  input,select { background:#0d1117; border:1px solid var(--line); color:var(--txt); padding:9px 12px; border-radius:8px; }
  button { background:var(--acc); color:#04101f; border:none; padding:9px 16px; border-radius:8px; font-weight:600; cursor:pointer; }
  button.ghost { background:transparent; border:1px solid var(--line); color:var(--txt); }
  button.danger { background:transparent; border:1px solid var(--fail); color:var(--fail); }
  .form { display:flex; gap:8px; flex-wrap:wrap; align-items:center; background:var(--card); border:1px solid var(--line); padding:14px; border-radius:10px; margin-bottom:18px; }
  #msg { font-size:13px; margin-left:auto; color:var(--mut); }
  .lat { color:var(--mut); }
  a { color:var(--acc); }
</style>
</head>
<body>
<header>
  <div>
    <h1>🌐 ISP Monitor</h1>
    <div class="sub">Pemantauan kesehatan jaringan ISP global — ping + HTTP realtime</div>
  </div>
  <div class="sub" id="clock"></div>
</header>

<div class="wrap">
  <div class="stats" id="stats"></div>

  <div class="actions">
    <button class="ghost" onclick="loadAll()">🔄 Refresh</button>
    <button onclick="toggleForm()">＋ Tambah ISP</button>
    <span id="msg"></span>
  </div>

  <div class="form" id="addForm" style="display:none">
    <input id="f_name" placeholder="Nama (mis. Telkomsel)" style="min-width:160px">
    <input id="f_country" placeholder="Negara (ID)" style="width:80px">
    <input id="f_region" placeholder="Kawasan (Java)" style="width:120px">
    <input id="f_ip" placeholder="IP/host (8.8.8.8)">
    <input id="f_url" placeholder="URL health (https://...)" style="min-width:220px">
    <button onclick="addIsp()">Simpan</button>
    <button class="ghost" onclick="toggleForm()">Batal</button>
  </div>

  <table>
    <thead>
      <tr><th>ISP</th><th>Negara</th><th>Kawasan</th><th>Status</th><th>Uptime Hari Ini</th><th>Cek</th><th></th></tr>
    </thead>
    <tbody id="rows"><tr><td colspan="7" style="color:var(--mut)">Memuat…</td></tr></tbody>
  </table>
</div>

<script>
const API = "";
function setMsg(t){ document.getElementById('msg').textContent = t; }
function toggleForm(){ const f=document.getElementById('addForm'); f.style.display = f.style.display==='none'?'flex':'none'; }

async function loadStats(){
  try{
    const r = await fetch(API+'/stats'); const s = await r.json();
    document.getElementById('stats').innerHTML = `
      <div class="stat"><div class="v">${s.total_isps??0}</div><div class="l">ISP Dipantau</div></div>
      <div class="stat"><div class="v">${s.checks_today??0}</div><div class="l">Cek Hari Ini</div></div>
      <div class="stat"><div class="v">${s.overall_uptime_percent??0}%</div><div class="l">Uptime Rata-rata</div></div>
      <div class="stat"><div class="v">${s.successful_checks??0}</div><div class="l">Cek Sukses</div></div>`;
  }catch(e){ setMsg('Gagal muat stats'); }
}

async function loadAll(){
  await loadStats();
  try{
    const r = await fetch(API+'/dashboard'); const list = await r.json();
    const tb = document.getElementById('rows');
    if(!list.length){ tb.innerHTML = '<tr><td colspan="7" style="color:var(--mut)">Belum ada ISP. Tambah lewat tombol di atas.</td></tr>'; return; }
    tb.innerHTML = list.map(isp => {
      const c = isp.cache;
      const up = c ? c.uptime_percent : 0;
      const ok = c && c.successful > 0;
      const pct = c ? Math.round(up) : 0;
      return `<tr>
        <td><b>${esc(isp.name)}</b>${isp.notes?`<div class="lat">${esc(isp.notes)}</div>`:''}</td>
        <td>${esc(isp.country)}</td>
        <td>${esc(isp.region||'-')}</td>
        <td><span class="badge ${ok?'ok':'fail'}">${ok?'ONLINE':'OFFLINE'}</span></td>
        <td><div style="display:flex;align-items:center;gap:8px"><div class="bar"><span style="width:${pct}%"></span></div><span class="lat">${pct}%</span></div></td>
        <td><button class="ghost" onclick="checkOne(${isp.id})">Cek</button></td>
        <td><button class="danger" onclick="delIsp(${isp.id})">🗑</button></td>
      </tr>`;
    }).join('');
  }catch(e){ setMsg('Gagal muat dashboard'); }
}

async function addIsp(){
  const body = {
    name: v('f_name'), country: v('f_country'), region: v('f_region')||null,
    isp_ip: v('f_ip')||null, http_url: v('f_url')||null
  };
  if(!body.name || !body.country){ setMsg('Nama & negara wajib'); return; }
  const r = await fetch(API+'/isps', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
  if(r.ok){ setMsg('ISP ditambah'); document.getElementById('addForm').reset?.(); toggleForm(); loadAll(); }
  else setMsg('Gagal: '+(await r.text()));
}

async function delIsp(id){
  if(!confirm('Hapus ISP #'+id+'?')) return;
  await fetch(API+'/isps/'+id, {method:'DELETE'});
  loadAll();
}
async function checkOne(id){
  setMsg('Mengecek ISP #'+id+'…');
  await fetch(API+'/health/'+id, {method:'POST'});
  setTimeout(loadAll, 2500);
}

const v = id => document.getElementById(id).value.trim();
const esc = s => (s??'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function tick(){ document.getElementById('clock').textContent = new Date().toLocaleString('id-ID'); }
tick(); setInterval(tick, 1000);
loadAll(); setInterval(loadAll, 15000);
</script>
</body>
</html>
