services:
  isp-monitor:
    build: .
    container_name: isp-monitor
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATA_DIR=/data
    volumes:
      - ./data:/data

  # ── Probe region (jalankan di VPS/device lain, bukan di central) ──
  # Uncomment untuk menjalankan probe di container ini (biasanya di mesin terpisah).
