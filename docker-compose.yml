services:
  isp-monitor:
    build:
      context: .
      target: production
    container_name: isp-monitor
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      - DATA_DIR=/data
      - PING_INTERVAL_SECONDS=10
      - HTTP_INTERVAL_SECONDS=30
      - STAGGER_MS=500
    volumes:
      - ./data:/data
    networks:
      - isp-net

  nginx:
    image: nginx:alpine
    container_name: isp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - isp-net
    depends_on:
      - isp-monitor

networks:
  isp-net:
    driver: bridge
