<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>404 — Halaman Tidak Ditemukan</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: -apple-system, Segoe UI, Roboto, sans-serif;
    background-color: #0b0f19;
    background-image: url("/logo.jpg?v=1");
    background-size: cover; background-position: center; background-attachment: fixed;
    color: #e6edf3;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  body::before {
    content: ""; position: fixed; inset: 0; z-index: -1;
    background: rgba(11,15,25,0.82); backdrop-filter: blur(6px); pointer-events: none;
  }
  .wrap { text-align: center; padding: 30px; }
  .code { font-size: 72px; font-weight: 800; background: linear-gradient(135deg,#58a6ff,#a371f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  h1 { font-size: 20px; margin: 10px 0; }
  p { color: #8b949e; margin-bottom: 20px; }
  a { display: inline-block; padding: 10px 20px; background: linear-gradient(135deg,#58a6ff,#a371f7); color: #fff; border-radius: 10px; text-decoration: none; font-weight: 600; }
  a:hover { opacity: .9; }
  .bg-orbs { position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none; }
  .bg-orbs span { position:absolute; border-radius:50%; filter:blur(60px); opacity:.35; }
  .bg-orbs span:nth-child(1){ width:380px;height:380px;background:#1f6feb;top:-80px;left:-60px; animation:float 14s ease-in-out infinite; }
  .bg-orbs span:nth-child(2){ width:320px;height:320px;background:#a371f7;bottom:-90px;right:10%; animation:float 18s ease-in-out infinite reverse; }
  .bg-orbs span:nth-child(3){ width:260px;height:260px;background:#3fb950;top:40%;right:-40px; animation:float 16s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(40px)} }
  .wrap { position:relative; z-index:1; }
</style>
</head>
<body>
<div class="bg-orbs"><span></span><span></span><span></span></div>
<div class="wrap">
  <div class="code">404</div>
  <h1>Halaman Tidak Ditemukan</h1>
  <p>Mungkin URL-nya salah atau udah dipindah.</p>
  <a href="/">← Kembali ke Beranda</a>
</div>
</body>
</html>
